; PlatformIO project for the STM32F103C8T6 "Blue Pill" board.
;
; Flash with an ST-Link (or a cheap "ST-Link V2" clone) via SWD, or a
; USB-TTL adapter + the built-in UART bootloader. See docs/wiring.md.

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube

build_flags =
    -D USE_HAL_DRIVER
    -D STM32F103xB
    -I include
    ; newlib-nano strips float support from *scanf/*printf by default;
    ; the serial protocol needs both for telemetry/command parsing.
    -u _printf_float
    -u _scanf_float

upload_protocol = stlink
debug_tool = stlink

monitor_speed = 115200
